# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - smn
    restart: unless-stopped

  smn:
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  worker:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  postgres:
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    ports: !reset []
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M

volumes:
  caddy_data:
  caddy_config:
